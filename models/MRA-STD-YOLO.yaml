# SDA-STD YOLO11 —— 面向无人机视角小目标检测的双高分辨率检测头模型
# 基于 YOLO11 主干，引入 SDA_Fusion / EMA / RFB 自定义模块
# 检测尺度: P2(1/4) + P3(1/8)，舍弃 P4/P5 大目标检测头
#
# 自定义模块来源（需在 task.py 或训练脚本中注册）:
#   SPDConv   — "No More Strided Convolutions or Pooling" (2022)
#   ASFF      — "Learning Spatial Fusion for Single-Shot Object Detection" (2019)
#   SDA_Fusion — 封装模块，内部调用 SPDConv + ASFF
#   EMA       — "Efficient Multi-Scale Attention Module with Cross-Spatial Learning" (ISCAS 2023)
#   RFB       — "Receptive Field Block Net for Accurate and Fast Object Detection" (ECCV 2018)
#
# Backbone 关键层索引（供 head 中 SDA_Fusion 的 from 列表引用）:
#   Layer 0  — 第一个 CBS (P1/2,  1/2 尺度, 64ch)
#   Layer 2  — 第一个 C3k2 (1/4  尺度, 256ch)
#   Layer 4  — 第二个 C3k2 (P3/8, 1/8  尺度, 512ch)

# Parameters
nc: 80 # 检测类别数
scales: # 模型复合缩放系数 [depth, width, max_channels]
  s: [0.50, 0.50, 1024]



# ─────────────────────────────────────────────
# Backbone: 标准 YOLO11 主干（层索引 0 ~ 10）
# ─────────────────────────────────────────────
backbone:
  # [from, repeats, module, args]
  - [-1, 1, Conv,   [64,   3, 2]]          # 0  — 第一个 CBS，P1/2  (B,  64, H/2,  W/2)
  - [-1, 1, Conv,   [128,  3, 2]]          # 1  — CBS，         P2/4  (B, 128, H/4,  W/4)
  - [-1, 2, C3k2,   [256,  False, 0.25]]   # 2  — 第一个 C3k2，  1/4  (B, 256, H/4,  W/4) ★引用点
  - [-1, 1, Conv,   [256,  3, 2]]          # 3  — CBS，         P3/8  (B, 256, H/8,  W/8)
  - [-1, 2, C3k2,   [512,  False, 0.25]]   # 4  — 第二个 C3k2，  1/8  (B, 512, H/8,  W/8) ★引用点
  - [-1, 1, Conv,   [512,  3, 2]]          # 5  — CBS，        P4/16  (B, 512, H/16, W/16)
  - [-1, 2, C3k2,   [512,  True]]          # 6  — C3k2，         1/16 (B, 512, H/16, W/16)
  - [-1, 1, Conv,   [1024, 3, 2]]          # 7  — CBS，        P5/32  (B,1024, H/32, W/32)
  - [-1, 2, C3k2,   [1024, True]]          # 8  — C3k2，         1/32 (B,1024, H/32, W/32)
  - [-1, 1, SPPF,   [1024, 5]]             # 9  — SPPF，         1/32 (B,1024, H/32, W/32)

# ─────────────────────────────────────────────
# Head: 自定义 Neck + 双高分辨率检测头（层索引 10 ~ 28）
# ─────────────────────────────────────────────
head:
  # ══════════════════════════════════════════
  # FPN 自上而下路径（3 次 Upsample，1/32 → 1/4）
  # ══════════════════════════════════════════

  # — Upsample #1: 1/32 → 1/16 —
  - [-1,       1, nn.Upsample, [None, 2, "nearest"]]  # 10 — 上采样 1/32→1/16 (B,1024,H/16,W/16)
  - [[-1, 6],  1, Concat,      [1]]                   # 11 — 融合 Backbone P4 ?  (B,1536,H/16,W/16)
  - [-1,       2, C3k2,        [512, False]]           # 12 — 特征提炼          (B, 512,H/16,W/16)

  # — Upsample #2: 1/16 → 1/8 —
  - [-1,       1, nn.Upsample, [None, 2, "nearest"]]  # 13 — 上采样 1/16→1/8  (B, 512, H/8, W/8)
  - [[-1, 4],  1, Concat,      [1]]                   # 14 — 融合 Backbone P3  (B,1024, H/8, W/8)
  - [-1,       2, C3k2,        [256, False]]           # 15 — 特征提炼          (B, 256, H/8, W/8)

  # — Upsample #3: 1/8 → 1/4 —
  - [-1,       1, nn.Upsample, [None, 2, "nearest"]]  # 16 — 上采样 1/8→1/4   (B, 256, H/4, W/4)
  - [[-1, 2],  1, Concat,      [1]]                   # 17 — 融合 第一个C3k2   (B, 512, H/4, W/4)
  - [-1,       2, C3k2,        [256, False]]           # 18 — 特征提炼          (B, 256, H/4, W/4)

  # ══════════════════════════════════════════
  # 第一阶段融合 —— P2 检测节点（1/4 尺度）
  # SDA_Fusion from 列表: [0, -1, 2]
  #   inputs[0] = Layer  0 (P1, 1/2,  64ch) → SPDConv 无损下采样 → 1/4
  #   inputs[1] = Layer 18 (-1, 1/4, 256ch) → 1×1 Conv 通道对齐  → 1/4 (目标分辨率)
  #   inputs[2] = Layer  2 (1/4,     256ch) → 1×1 Conv 通道对齐  → 1/4 (同尺度，无需上采样)
  # ══════════════════════════════════════════
  - [[0, -1, 2], 1, SDA_Fusion, [[64, 256, 256], 256]]  # 19 — 三路自适应融合  (B, 256, H/4, W/4)
  - [-1,         2, C3k2,       [256, False]]            # 20 — 特征提炼        (B, 256, H/4, W/4)
  - [-1,         1, EMA,        [256]]                   # 21 — EMA 注意力聚焦  (B, 256, H/4, W/4) ★P2节点

  # ══════════════════════════════════════════
  # 第二阶段融合 —— P3 检测节点（1/8 尺度）
  # SDA_Fusion from 列表: [2, -1, 4]
  #   inputs[0] = Layer  2 (第一个C3k2, 1/4, 256ch) → SPDConv 无损下采样 → 1/8
  #   inputs[1] = Layer 22 (-1,          1/8, 256ch) → 1×1 Conv 通道对齐  → 1/8 (目标分辨率)
  #   inputs[2] = Layer  4 (第二个C3k2,  1/8, 512ch) → 1×1 Conv 通道对齐  → 1/8 (同尺度，无需上采样)
  # ══════════════════════════════════════════
  - [-1,         1, Conv,       [256, 3, 2]]             # 22 — 下采样 1/4→1/8  (B, 256, H/8, W/8)
  - [[2, -1, 4], 1, SDA_Fusion, [[256, 256, 512], 256]]  # 23 — 三路自适应融合  (B, 256, H/8, W/8)
  - [-1,         2, C3k2,       [256, False]]            # 24 — 特征提炼        (B, 256, H/8, W/8)
  - [-1,         1, EMA,        [256]]                   # 25 — EMA 注意力聚焦  (B, 256, H/8, W/8) ★P3节点

  # ══════════════════════════════════════════
  # 双高分辨率检测头（舍弃 P4/P5，专注小目标）
  # ══════════════════════════════════════════
  - [21, 1, RFB,    [256]]          # 26 — P2 感受野增强 (B, 256, H/4, W/4)  c1由parse_model自动注入
  - [25, 1, RFB,    [256]]          # 27 — P3 感受野增强 (B, 256, H/8, W/8)  c1由parse_model自动注入

  - [[26, 27], 1, Detect, [nc]]     # 28 — 双头检测: P2(1/4) + P3(1/8)